# Dependabot - Automatisk oppdatering av avhengigheter

version: 2
updates:
  # Docker (Base images)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Oslo"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
